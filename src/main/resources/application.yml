server:
  port: ${PORT:8090}

spring:
  application:
    name: rfc-service
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

# Security
security:
  api-key: ${SAP_PROXY_API_KEY:dev-api-key}

# RFC configuration
rfc:
  timeout:
    default: ${RFC_TIMEOUT_DEFAULT:30}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.dodge.rfc: DEBUG
    com.sap.conn.jco: WARN
