server:
  port: ${PORT:8090}

spring:
  application:
    name: rfc-service
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Security
security:
  api-key: ${SAP_PROXY_API_KEY:dev-api-key}

# RFC configuration
rfc:
  default-destination: ${RFC_DEFAULT_DESTINATION:local}
  timeout:
    default: ${RFC_TIMEOUT_DEFAULT:30}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.dodge.rfc: DEBUG
    com.sap.conn.jco: WARN
