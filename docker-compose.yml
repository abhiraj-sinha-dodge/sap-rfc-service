services:
  rfc-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: dodge/rfc-service:latest
    container_name: rfc-service
    ports:
      - "${PORT:-8090}:8090"
    env_file:
      - .env
    environment:
      - LD_LIBRARY_PATH=/app/lib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/rfc/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
